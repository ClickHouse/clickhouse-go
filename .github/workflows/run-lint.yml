name: Lint

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: [self-hosted, style-checker-aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: golangci-lint root
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: golangci-lint tests
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: tests

      - name: golangci-lint examples
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: examples

      - name: golangci-lint benchmark
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: benchmark
